<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оставить отзыв</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:600px;
    background:#181818;
    border:1px solid #2f2f2f;
    border-radius:24px;
    padding:35px;
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:36px;
}

.sub{
    text-align:center;
    color:#cfcfcf;
    margin-bottom:30px;
}

textarea{
    width:100%;
    height:170px;
    background:#101010;
    border:1px solid #333;
    border-radius:15px;
    color:white;
    padding:15px;
    resize:none;
    margin-bottom:20px;
    font-size:15px;
}

select{
    width:100%;
    background:#101010;
    border:1px solid #333;
    border-radius:15px;
    color:white;
    padding:15px;
    margin-bottom:20px;
}

button{
    width:100%;
    background:white;
    color:black;
    border:none;
    padding:16px;
    border-radius:15px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:20px;
    word-break:break-all;
    color:#7eb7ff;
    text-align:center;
}
</style>
</head>

<body>

<div class="box">

    <h1>Оставьте отзыв</h1>

    <div class="sub">
        Ваш отзыв будет опубликован анонимно
    </div>

    <textarea id="text"
        placeholder="Введите ваш отзыв..."></textarea>

    <select id="stars">
        <option value="5">5 звезд</option>
        <option value="4">4 звезды</option>
        <option value="3">3 звезды</option>
        <option value="2">2 звезды</option>
        <option value="1">1 звезда</option>
    </select>

    <button onclick="generateLink()">
        Сгенерировать ссылку
    </button>

    <div class="result" id="result"></div>

</div>

<script>

function generateLink(){

    const text = document.getElementById("text").value.trim();
    const stars = document.getElementById("stars").value;

    if(!text){
        alert("Введите отзыв");
        return;
    }

    const data = {
        text:text,
        stars:stars
    };

    const encoded =
        btoa(unescape(encodeURIComponent(JSON.stringify(data))));

    const link =
        window.location.origin +
        "/?review=" +
        encoded;

    document.getElementById("result").innerHTML =
        `<a href="${link}" target="_blank">${link}</a>`;
}

</script>

</body>
</html>
