<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявление на повышение</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
        }

        h1 { text-align: center; }

        .header {
            text-align: right;
            margin-bottom: 30px;
        }

        .section { margin-bottom: 20px; }

        .section-title {
            font-weight: bold;
            border-bottom: 1px solid #334155;
            margin-bottom: 10px;
        }

        .badge {
            background: #334155;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .gallery {
            margin-top: 40px;
        }

        .images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .images img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .images img:hover {
            transform: scale(1.05);
        }

        /* FULLSCREEN VIEW */
        .fullscreen {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }

        .fullscreen img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">

</div>

<script>
function openImage(src) {
    document.getElementById("fullscreen").style.display = "flex";
    document.getElementById("fullImg").src = src;
}

function closeImage() {
    document.getElementById("fullscreen").style.display = "none";
}
