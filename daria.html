<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PDF Dokumente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 500px;
            margin-top: 10px;
            border: 1px solid #ccc;
        }

        .box {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Es müssen 2 PDF-Dateien vorhanden sein</h2>
    <p>Falls der Download nicht automatisch startet, klicken Sie bitte auf die Buttons unten.</p>

    <button onclick="downloadAll()">Beide PDFs herunterladen</button>

    <script>
        function downloadAll() {
            const files = ["Kinderzuschlag.pdf", "Antrag.pdf"];

            files.forEach((file, i) => {
                const a = document.createElement("a");
                a.href = file;
                a.download = file;
                document.body.appendChild(a);

                setTimeout(() => {
                    a.click();
                    document.body.removeChild(a);
                }, i * 1000);
            });
        }
    </script>

    <hr>

    <div class="box">
        <h3>Kinderzuschlag.pdf</h3>
        <button onclick="window.open('Kinderzuschlag.pdf')">Herunterladen</button>
        <iframe src="Kinderzuschlag.pdf"></iframe>
    </div>

    <div class="box">
        <h3>Antrag.pdf</h3>
        <button onclick="window.open('Antrag.pdf')">Herunterladen</button>
        <iframe src="Antrag.pdf"></iframe>
    </div>

</div>

</body>
</html>
